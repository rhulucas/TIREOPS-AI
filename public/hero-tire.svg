<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d6fdb;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1d6fdb;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="tread" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#94a3b8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.25"/>
    </linearGradient>
  </defs>
  <!-- Tire profile -->
  <ellipse cx="200" cy="140" rx="150" ry="75" fill="url(#tg)"/>
  <ellipse cx="200" cy="140" rx="130" ry="60" fill="none" stroke="#94a3b8" stroke-width="2.5" opacity="0.25"/>
  <ellipse cx="200" cy="140" rx="50" ry="25" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
  <!-- Tread pattern -->
  <path d="M70 140 H330" stroke="url(#tread)" stroke-width="4" stroke-linecap="round"/>
  <path d="M200 65 V215" stroke="url(#tread)" stroke-width="3" stroke-linecap="round"/>
  <path d="M115 90 L285 190" stroke="#cbd5e1" stroke-width="1.5" opacity="0.2"/>
  <path d="M115 190 L285 90" stroke="#cbd5e1" stroke-width="1.5" opacity="0.2"/>
  <!-- Accent ring -->
  <ellipse cx="200" cy="140" rx="145" ry="72" fill="none" stroke="#1d6fdb" stroke-width="1" opacity="0.15"/>
</svg>
